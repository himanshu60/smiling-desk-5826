# Render blueprint — deploys BOTH the backend (Node web service) and the
# frontend (static site) from this repo. In Render: New + > Blueprint,
# point at this repo, and it reads this file.
#
# Keep the service names as-is: the frontend's config.js defaults to
# https://smiling-desk-backend.onrender.com, which matches the backend name.
services:
  # ---------- Backend: Node + Express API ----------
  - type: web
    name: smiling-desk-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Render injects PORT automatically — do not set it.
      - key: mongoUrl
        sync: false # set in the Render dashboard (secret)
      - key: key
        sync: false # set in the Render dashboard (secret)
      - key: CLIENT_ORIGINS
        value: https://smiling-desk-frontend.onrender.com

  # ---------- Frontend: static site ----------
  - type: web
    name: smiling-desk-frontend
    runtime: static
    rootDir: frontend
    buildCommand: echo "static site — no build step"
    staticPublishPath: .
