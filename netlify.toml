# Netlify config — serves the static frontend from /frontend as the site root.
[build]
  publish = "frontend"

# Static multi-page site: no build step needed.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
