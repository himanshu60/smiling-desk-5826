<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | Click &amp; Collect</title>
  <meta name="description" content="Browse and filter products by category, price and rating on Click & Collect." />
  <link rel="shortcut icon" href="./images/supermart-favicon.png" type="image/x-icon" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/theme.css" />
</head>

<body>
  <div id="app-nav"></div>

  <div class="container py-3">
    <!-- results bar -->
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <h5 class="fw-bold mb-0" id="cc-results-title">All Products</h5>
        <small class="text-muted" id="cc-results-count">Loading…</small>
      </div>
      <button class="btn btn-outline-primary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#ccFilters">
        <i class="bi bi-sliders"></i> Filters
      </button>
    </div>

    <div class="row g-3">
      <!-- Sidebar (sticky on desktop, offcanvas drawer on mobile) -->
      <div class="col-lg-3">
        <div class="offcanvas-lg offcanvas-start cc-sidebar" tabindex="-1" id="ccFilters">
          <div class="offcanvas-header d-lg-none">
            <h5 class="offcanvas-title fw-bold">Filters</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#ccFilters"></button>
          </div>
          <div class="offcanvas-body d-block p-0">
            <div class="cc-filter-card">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">Filters</h6>
                <button class="btn btn-sm btn-link text-decoration-none p-0" id="f-reset">Reset</button>
              </div>
            </div>
            <div class="cc-filter-card">
              <h6><i class="bi bi-grid me-1"></i> Category</h6>
              <select class="form-select cc-form-select" id="f-category">
                <option value="">All categories</option>
                <option value="mobiles">Mobiles</option>
                <option value="laptops">Laptops</option>
                <option value="groceries">Grocery</option>
              </select>
            </div>
            <div class="cc-filter-card">
              <h6><i class="bi bi-sort-down me-1"></i> Sort by Price</h6>
              <select class="form-select cc-form-select" id="f-sort">
                <option value="">Featured</option>
                <option value="asc">Price: Low to High</option>
                <option value="dsc">Price: High to Low</option>
              </select>
            </div>
            <div class="cc-filter-card">
              <h6><i class="bi bi-star me-1"></i> Rating</h6>
              <select class="form-select cc-form-select" id="f-rating">
                <option value="">Any rating</option>
                <option value="4">4★ &amp; above</option>
                <option value="3">3★ &amp; above</option>
                <option value="5">5★ only</option>
              </select>
            </div>
            <div class="cc-filter-card">
              <h6><i class="bi bi-currency-rupee me-1"></i> Max Price</h6>
              <input type="range" class="form-range" id="f-price" min="0" max="100000" step="1000" value="100000" />
              <div class="d-flex justify-content-between small text-muted">
                <span>₹0</span><span id="f-price-val">₹1,00,000</span>
              </div>
            </div>
            <div class="cc-filter-card">
              <h6><i class="bi bi-box-seam me-1"></i> Availability</h6>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="f-instock" />
                <label class="form-check-label" for="f-instock">In stock only</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Product grid -->
      <div class="col-lg-9">
        <div class="row g-3" id="cc-products"></div>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./scripts/config.js"></script>
  <script src="./scripts/components.js"></script>
  <script src="./scripts/products.js"></script>
</body>

</html>
